name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/RoundedTB.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore RoundedTB.sln

      - name: Build Release
        run: msbuild RoundedTB.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo

      - name: Rename output folder
        shell: pwsh
        run: |
          $hash  = git rev-parse --short $env:GITHUB_SHA
          $found = Get-ChildItem ".\RoundedTB\bin\Release" -Directory | Select-Object -First 1
          if ($found) {
            Rename-Item -Path $found.FullName -NewName "RoundedTB-$hash"
            Write-Host "Output folder: RoundedTB-$hash"
          } else {
            Write-Error "No output folder under .\RoundedTB\bin\Release"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RoundedTB-DockMag-${{ github.sha }}
          path: .\RoundedTB\bin\RoundedTB-*\
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore RoundedTB.sln

      - name: Build Release
        run: msbuild RoundedTB.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo

      - name: Zip release output
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = Get-ChildItem ".\RoundedTB\bin\Release" -Directory | Select-Object -First 1
          Compress-Archive -Path "$($src.FullName)\*" -DestinationPath "RoundedTB-DockMag-$tag.zip"
          Write-Host "Created RoundedTB-DockMag-$tag.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "RoundedTB Dock Magnification ${{ github.ref_name }}"
          body: |
            ## macOS Dock Magnification for Windows 11 Taskbar

            ### How to use
            1. Extract the zip
            2. Run `RoundedTB.exe`
            3. Enable **"macOS Dock magnification on hover"**
            4. Adjust the scale slider to taste
          files: RoundedTB-DockMag-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
