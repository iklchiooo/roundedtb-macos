name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/RoundedTB.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore RoundedTB.sln

      - name: Build Release
        run: msbuild RoundedTB.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo

      - name: Zip output
        shell: pwsh
        run: |
          $hash = git rev-parse --short $env:GITHUB_SHA
          $src  = Get-ChildItem ".\RoundedTB\bin\Release" -Directory | Select-Object -First 1
          if (-not $src) { Write-Error "No Release output folder found!"; exit 1 }
          Compress-Archive -Path "$($src.FullName)\*" -DestinationPath ".\RoundedTB-$hash.zip"
          Write-Host "Created RoundedTB-$hash.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RoundedTB-DockMag
          path: .\RoundedTB-*.zip
          if-no-files-found: error
